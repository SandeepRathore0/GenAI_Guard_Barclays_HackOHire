<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Guard | Settings</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <i class="fas fa-shield-alt"></i> GenAI Guard
        </div>
        <a href="/dashboard" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="logs.html" class="nav-item"><i class="fas fa-database"></i> Logs</a>
        <a href="#" class="nav-item active"><i class="fas fa-cogs"></i> Settings</a>
        <div class="sidebar-footer">
            <div style="font-size: 0.8rem; color: var(--text-muted);">
                <i class="fas fa-user-circle"></i> Admin User<br>
                <span style="color: var(--success); font-size: 0.7rem;">● Connected</span>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main-content">
        <div class="top-bar">
            <div>
                <h1>Settings</h1>
                <p style="margin: 5px 0 0; color: var(--text-muted);">System Configuration & Preferences</p>
            </div>
        </div>

        <div class="settings-card">
            <h3><i class="fas fa-sliders-h"></i> Risk Thresholds</h3>
            <div class="form-group">
                <label>Threat Score Threshold (0-100)</label>
                <input type="number" id="threatThreshold" placeholder="50" min="0" max="100">
                <small>Scores above this value will be marked as THREAT.</small>
            </div>
        </div>

        <div class="settings-card">
            <h3><i class="fas fa-key"></i> API Configuration (Client-side Placeholder)</h3>
            <div class="form-group">
                <label>OpenAI API Key</label>
                <input type="password" id="openaiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>VirusTotal API Key</label>
                <input type="password" id="vtKey" placeholder="Visual only...">
            </div>
        </div>

        <div class="settings-card">
            <h3><i class="fas fa-bell"></i> Notifications</h3>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="emailAlerts"> Enable Email Alerts
                </label>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="slackAlerts"> Enable Slack Integration
                </label>
            </div>
        </div>

        <button class="btn-save" onclick="saveSettings()"><i class="fas fa-save"></i> Save Changes</button>
    </div>

    <div id="toast" class="toast">Settings Saved Successfully!</div>

    <script>
        // Load Settings
        window.onload = function () {
            const threshold = localStorage.getItem('threatThreshold') || 50;
            document.getElementById('threatThreshold').value = threshold;

            document.getElementById('emailAlerts').checked = localStorage.getItem('emailAlerts') === 'true';
            document.getElementById('slackAlerts').checked = localStorage.getItem('slackAlerts') === 'true';
        };

        function saveSettings() {
            const threshold = document.getElementById('threatThreshold').value;
            const email = document.getElementById('emailAlerts').checked;
            const slack = document.getElementById('slackAlerts').checked;

            localStorage.setItem('threatThreshold', threshold);
            localStorage.setItem('emailAlerts', email);
            localStorage.setItem('slackAlerts', slack);

            // Show Toast
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    </script>
</body>

</html>
